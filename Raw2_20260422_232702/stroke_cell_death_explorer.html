<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stroke Cell Death Explorer</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"><\/script>
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; background: #FAF9F3; color: #222; }

/* ============================================================
   LAYOUT
   ============================================================ */
#app { display: flex; flex-direction: column; height: 100vh; }

/* Header */
#header {
  background: #1a1a2e; color: #fff;
  padding: 10px 20px; display: flex; align-items: center; gap: 16px;
  flex-shrink: 0; border-bottom: 3px solid #0279EE;
}
#header .logo-mark {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, #0279EE, #FF9400);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 18px; color: #fff; flex-shrink: 0;
}
#header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
#header p  { font-size: 11px; color: #aab; margin-top: 2px; }

/* Body row */
#body-row { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
#sidebar {
  width: 260px; min-width: 260px;
  background: #1a1a2e; color: #dde;
  overflow-y: auto; padding: 12px 10px 20px;
  flex-shrink: 0; border-right: 1px solid #2a2a4e;
}
#sidebar::-webkit-scrollbar { width: 5px; }
#sidebar::-webkit-scrollbar-thumb { background: #3a3a5e; border-radius: 3px; }

.sidebar-section { margin-bottom: 14px; }
.sidebar-section h3 {
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: #778;
  padding: 4px 4px 6px; border-bottom: 1px solid #2a2a4e; margin-bottom: 6px;
}
.sidebar-toggle {
  font-size: 10px; color: #0279EE; cursor: pointer;
  text-decoration: underline; margin-bottom: 5px; display: inline-block;
}
.sidebar-toggle:hover { color: #4aabff; }

.cb-row {
  display: flex; align-items: center; gap: 5px;
  padding: 2px 4px; border-radius: 4px; cursor: pointer; transition: background 0.15s;
}
.cb-row:hover { background: #2a2a4e; }
.cb-row input[type=checkbox] { accent-color: #0279EE; cursor: pointer; flex-shrink: 0; }
.cb-row label { cursor: pointer; font-size: 12px; flex: 1; line-height: 1.3; }

.tier-badge {
  font-size: 9px; padding: 1px 4px; border-radius: 3px;
  background: #2a2a4e; color: #aab; flex-shrink: 0;
}
.tier-1 { background: #0279EE22; color: #4aabff; }
.tier-2 { background: #75A02522; color: #a0d060; }
.tier-3 { background: #FF940022; color: #ffb84a; }
.tier-4 { background: #55555522; color: #888; }

.radio-row {
  display: flex; align-items: center; gap: 5px;
  padding: 2px 4px; border-radius: 4px; cursor: pointer;
}
.radio-row:hover { background: #2a2a4e; }
.radio-row input[type=radio] { accent-color: #0279EE; cursor: pointer; }
.radio-row label { cursor: pointer; font-size: 12px; }

#reset-btn {
  width: 100%; padding: 7px; margin-top: 8px;
  background: #0279EE; color: #fff; border: none;
  border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600;
  transition: background 0.2s;
}
#reset-btn:hover { background: #0260cc; }

/* Main content */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Tab nav */
#tab-nav {
  display: flex; background: #fff;
  border-bottom: 2px solid #e8e8e8;
  flex-shrink: 0; padding: 0 16px; overflow-x: auto;
}
.tab-btn {
  padding: 10px 14px; border: none; background: none;
  cursor: pointer; font-size: 12px; font-weight: 600;
  color: #666; border-bottom: 3px solid transparent;
  margin-bottom: -2px; transition: all 0.15s; white-space: nowrap;
}
.tab-btn:hover { color: #0279EE; }
.tab-btn.active { color: #0279EE; border-bottom-color: #0279EE; }

/* Tab content */
#tab-content { flex: 1; overflow-y: auto; padding: 16px; background: #FAF9F3; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Footer */
#footer {
  background: #1a1a2e; color: #778;
  font-size: 10px; text-align: center;
  padding: 6px; flex-shrink: 0; border-top: 1px solid #2a2a4e;
}

/* ============================================================
   TAB 0 — DATASET OVERVIEW
   ============================================================ */
.dataset-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
}
@media (max-width: 1000px) { .dataset-grid { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 650px)  { .dataset-grid { grid-template-columns: 1fr; } }

.ds-card {
  background: #fff; border-radius: 10px;
  border: 1px solid #e0e0e0; padding: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  transition: box-shadow 0.2s, transform 0.2s;
}
.ds-card:hover { box-shadow: 0 4px 16px rgba(2,121,238,0.12); transform: translateY(-1px); }
.ds-card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
.ds-card-header a { font-size: 14px; font-weight: 700; color: #0279EE; text-decoration: none; }
.ds-card-header a:hover { text-decoration: underline; }
.ds-card-author { font-style: italic; color: #555; font-size: 11px; margin-bottom: 6px; }
.ds-card-meta { font-size: 11px; color: #444; line-height: 1.8; }
.ds-card-weight { margin-top: 7px; font-size: 11px; display: flex; align-items: center; gap: 6px; }
.weight-bar-bg { flex: 1; height: 5px; background: #eee; border-radius: 3px; overflow: hidden; }
.weight-bar-fill { height: 100%; background: #0279EE; border-radius: 3px; }
.ds-card-flag {
  margin-top: 5px; font-size: 10px; color: #cc7000;
  background: #FF940011; padding: 2px 7px; border-radius: 4px;
  border-left: 2px solid #FF9400;
}
.ds-card-dots { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.ct-chip {
  display: flex; align-items: center; gap: 3px;
  font-size: 9px; padding: 2px 5px; border-radius: 10px;
  background: #f0f0f0; color: #444;
}
.ct-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ============================================================
   PLOT CONTAINERS
   ============================================================ */
.plot-container {
  background: #fff; border-radius: 10px;
  border: 1px solid #e0e0e0; padding: 14px; margin-bottom: 14px;
}
.plot-title { font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 3px; }
.plot-subtitle { font-size: 11px; color: #666; margin-bottom: 10px; }
.note-banner {
  background: #0279EE11; border-left: 3px solid #0279EE;
  padding: 7px 12px; border-radius: 0 6px 6px 0;
  font-size: 11px; color: #0260cc; margin-bottom: 12px;
}
.warn-banner {
  background: #FF940011; border-left: 3px solid #FF9400;
  padding: 7px 12px; border-radius: 0 6px 6px 0;
  font-size: 11px; color: #cc7000; margin-bottom: 12px;
}
.empty-state { text-align: center; padding: 60px 20px; color: #999; font-size: 14px; }

/* ============================================================
   TAB 4 — GENE CONTROLS
   ============================================================ */
.gene-controls {
  display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
  background: #fff; border-radius: 8px; border: 1px solid #e0e0e0;
  padding: 10px 14px; margin-bottom: 12px;
}
.gene-controls label { font-size: 11px; font-weight: 600; color: #555; }
.gene-controls select {
  border: 1px solid #ddd; border-radius: 5px;
  padding: 4px 8px; font-size: 12px; background: #fff; color: #222; cursor: pointer;
}
.gene-controls select:focus { outline: 2px solid #0279EE; }
.ctrl-group { display: flex; align-items: center; gap: 6px; }

/* Section title */
.section-title {
  font-size: 13px; font-weight: 700; color: #1a1a2e;
  margin-bottom: 8px; padding-bottom: 4px; border-bottom: 2px solid #0279EE;
}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div class="logo-mark">S</div>
    <div>
      <h1>Stroke Cell Death Explorer</h1>
      <p>Apoptosis &middot; Ferroptosis &middot; Necroptosis across 9 stroke scRNA-seq datasets</p>
    </div>
  </div>

  <!-- BODY ROW -->
  <div id="body-row">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="sidebar-section">
        <h3>Datasets</h3>
        <span class="sidebar-toggle" id="ds-toggle">Select All / None</span>
        <div id="ds-checkboxes"></div>
      </div>
      <div class="sidebar-section">
        <h3>Cell Types</h3>
        <span class="sidebar-toggle" id="ct-toggle">Select All / None</span>
        <div id="ct-checkboxes"></div>
      </div>
      <div class="sidebar-section">
        <h3>Pathways</h3>
        <div id="pw-checkboxes"></div>
      </div>
      <div class="sidebar-section">
        <h3>Gene Set</h3>
        <div class="radio-row">
          <input type="radio" name="gene_set" id="gs-core" value="core" checked>
          <label for="gs-core">Core (28 genes)</label>
        </div>
        <div class="radio-row">
          <input type="radio" name="gene_set" id="gs-full" value="full">
          <label for="gs-full">Full gene set</label>
        </div>
      </div>
      <div class="sidebar-section">
        <h3>Weighting</h3>
        <div class="cb-row">
          <input type="checkbox" id="use-weights" checked>
          <label for="use-weights">Apply dataset quality weights</label>
        </div>
      </div>
      <button id="reset-btn">&#8635; Reset to Defaults</button>
    </div>

    <!-- MAIN -->
    <div id="main">
      <div id="tab-nav">
        <button class="tab-btn active" data-tab="0">&#128202; Overview</button>
        <button class="tab-btn" data-tab="1">&#127777; Heatmap</button>
        <button class="tab-btn" data-tab="2">&#127795; Forest Plot</button>
        <button class="tab-btn" data-tab="3">&#128336; Temporal</button>
        <button class="tab-btn" data-tab="4">&#128202; Per-Gene</button>
        <button class="tab-btn" data-tab="5">&#129504; Glial States</button>
      </div>
      <div id="tab-content">

        <!-- TAB 0 -->
        <div class="tab-panel active" id="tab-0">
          <div class="dataset-grid" id="ds-overview-grid"></div>
        </div>

        <!-- TAB 1 -->
        <div class="tab-panel" id="tab-1">
          <div class="plot-container">
            <div class="plot-title">Cell Death Module Score Heatmap</div>
            <div class="plot-subtitle">Z-scored delta (stroke &minus; ctrl) per cell type &times; dataset. Blue = below mean, Red = above mean. Grey = missing data.</div>
            <div id="heatmap-plot" style="width:100%;min-height:520px;"></div>
          </div>
        </div>

        <!-- TAB 2 -->
        <div class="tab-panel" id="tab-2">
          <div class="plot-container">
            <div class="plot-title">Forest Plot &mdash; Weighted Mean Delta per Cell Type</div>
            <div class="plot-subtitle">Weighted mean &Delta; module score (stroke &minus; ctrl) &plusmn; 95% CI across selected datasets. Light blue band = vascular cell types.</div>
            <div id="forest-plot" style="width:100%;min-height:520px;"></div>
          </div>
        </div>

        <!-- TAB 3 -->
        <div class="tab-panel" id="tab-3">
          <div class="note-banner">
            &#128204; Primary data: <strong>GSE197341</strong> (dMCAO, mouse, D3/7/14/28) &mdash; solid lines.
            Dashed overlay: <strong>GSE279666</strong> (D3/14).
          </div>
          <div class="plot-container">
            <div class="plot-title">Temporal Dynamics of Cell Death Scores</div>
            <div class="plot-subtitle">Delta module score (stroke &minus; Sham) over days post-stroke. One panel per pathway.</div>
            <div id="temporal-plot" style="width:100%;min-height:520px;"></div>
          </div>
        </div>

        <!-- TAB 4 -->
        <div class="tab-panel" id="tab-4">
          <div class="gene-controls">
            <div class="ctrl-group">
              <label for="gene-select">Gene:</label>
              <select id="gene-select"></select>
            </div>
            <div class="ctrl-group">
              <label for="groupby-select">Group by:</label>
              <select id="groupby-select">
                <option value="cell_type">Cell type</option>
                <option value="dataset">Dataset</option>
              </select>
            </div>
            <div class="ctrl-group">
              <label for="show-select">Show:</label>
              <select id="show-select">
                <option value="both">Stroke vs Control</option>
                <option value="delta">Delta only</option>
              </select>
            </div>
          </div>
          <div class="plot-container">
            <div class="plot-title" id="gene-plot-title">Per-Gene Expression</div>
            <div class="plot-subtitle" id="gene-plot-subtitle">Mean expression across selected datasets and cell types.</div>
            <div id="gene-plot" style="width:100%;min-height:450px;"></div>
          </div>
        </div>

        <!-- TAB 5 -->
        <div class="tab-panel" id="tab-5">
          <div class="note-banner">
            &#128204; Glial state signatures: A1/A2 from <strong>Liddelow et al. 2017</strong>; DAM from <strong>Keren-Shaul et al. 2017</strong>
          </div>
          <div class="plot-container">
            <div class="section-title">Astrocyte Reactive States</div>
            <div id="astro-plot" style="width:100%;min-height:380px;"></div>
          </div>
          <div class="plot-container">
            <div class="section-title">Microglia Activation States</div>
            <div id="micro-plot" style="width:100%;min-height:380px;"></div>
          </div>
        </div>

      </div><!-- /tab-content -->
    </div><!-- /main -->
  </div><!-- /body-row -->

  <div id="footer">
    Data: 9 public GEO datasets &nbsp;|&nbsp; Analysis: Rust lab &nbsp;|&nbsp; Built with Plotly.js
  </div>
</div><!-- /app -->

/** Filter DATA_SCORES by current state */
function filteredScores() {
  return DATA_SCORES.filter(r =>
    state.datasets.has(r.dataset) &&
    state.cellTypes.has(r.cell_type) &&
    state.pathways.has(r.pathway) &&
    r.gene_set === state.geneSet
  );
}

/** Standard deviation */
function sd(arr) {
  if (arr.length < 2) return 0;
  const m = arr.reduce((a,b) => a+b, 0) / arr.length;
  return Math.sqrt(arr.reduce((s,x) => s + (x-m)**2, 0) / (arr.length - 1));
}

/** Weighted mean */
function weightedMean(vals, weights) {
  const sw = weights.reduce((a,b) => a+b, 0);
  if (sw === 0) return 0;
  return vals.reduce((s,v,i) => s + v*weights[i], 0) / sw;
}

/** Dataset ordering: Acute → Multi → Chronic */
const TIMEBIN_ORDER = { 'Acute': 0, 'Multi': 1, 'Chronic': 2 };
function sortDatasets(dsList) {
  return [...dsList].sort((a,b) => {
    const ta = TIMEBIN_ORDER[DS_META[a]?.timebin] ?? 99;
    const tb = TIMEBIN_ORDER[DS_META[b]?.timebin] ?? 99;
    return ta !== tb ? ta - tb : a.localeCompare(b);
  });
}

/** Cell type ordering */
function sortCellTypes(ctList) {
  return [...ctList].sort((a,b) => {
    const ia = CT_ORDER.indexOf(a);
    const ib = CT_ORDER.indexOf(b);
    const ra = ia === -1 ? 999 : ia;
    const rb = ib === -1 ? 999 : ib;
    return ra - rb;
  });
}

/** Empty state HTML */
function emptyState(msg) {
  return `<div class="empty-state">&#128203; ${msg || 'No data for current selection.'}</div>`;
}

/* ============================================================
   TAB 1 — HEATMAP
   ============================================================ */
function renderHeatmap() {
  const container = document.getElementById('heatmap-plot');

  const scores = filteredScores();
  if (scores.length === 0) {
    container.innerHTML = emptyState('No data matches current filters.');
    return;
  }

  const selDatasets  = sortDatasets([...state.datasets]);
  const selCellTypes = sortCellTypes([...state.cellTypes]);
  const selPathways  = [...state.pathways];

  if (selPathways.length === 0) {
    container.innerHTML = emptyState('Select at least one pathway.');
    return;
  }

  // Build lookup: pathway → dataset → cell_type → delta_z
  const lookup = {};
  scores.forEach(r => {
    if (!lookup[r.pathway]) lookup[r.pathway] = {};
    if (!lookup[r.pathway][r.dataset]) lookup[r.pathway][r.dataset] = {};
    lookup[r.pathway][r.dataset][r.cell_type] = { delta_z: r.delta_z, delta: r.delta, weight: r.weight };
  });

  // Build one heatmap trace per pathway
  const traces = [];
  const nPw = selPathways.length;

  selPathways.forEach((pw, pi) => {
    const xLabels = selDatasets;
    const yLabels = [...selCellTypes].reverse(); // Plotly heatmap: bottom-up

    const z = [];
    const customdata = [];

    yLabels.forEach(ct => {
      const zRow = [];
      const cdRow = [];
      xLabels.forEach(ds => {
        const entry = lookup[pw]?.[ds]?.[ct];
        if (entry !== undefined) {
          zRow.push(entry.delta_z);
          cdRow.push({ ds, ct, pw, delta: entry.delta, delta_z: entry.delta_z, weight: entry.weight });
        } else {
          zRow.push(null);
          cdRow.push({ ds, ct, pw, delta: null, delta_z: null, weight: null });
        }
      });
      z.push(zRow);
      customdata.push(cdRow);
    });

    traces.push({
      type: 'heatmap',
      z: z,
      x: xLabels,
      y: yLabels,
      colorscale: [
        [0,   '#2166AC'],
        [0.25,'#74ADD1'],
        [0.5, '#FFFFFF'],
        [0.75,'#F4A582'],
        [1,   '#D6604D']
      ],
      zmin: -2, zmax: 2,
      colorbar: {
        title: { text: 'Z-score', side: 'right' },
        thickness: 12,
        len: 0.6,
        x: (pi + 1) / nPw - 0.01
      },
      showscale: pi === nPw - 1,
      xaxis: `x${pi === 0 ? '' : pi+1}`,
      yaxis: `y${pi === 0 ? '' : pi+1}`,
      customdata: customdata,
      hovertemplate:
        '<b>%{customdata.ds}</b><br>' +
        'Cell type: %{customdata.ct}<br>' +
        'Pathway: %{customdata.pw}<br>' +
        'Delta: %{customdata.delta:.4f}<br>' +
        'Z-score: %{customdata.delta_z:.3f}<br>' +
        'Weight: %{customdata.weight}<extra></extra>',
      name: pw
    });
  });

  // Annotations for subplot titles
  const annotations = selPathways.map((pw, pi) => ({
    text: `<b>${pw}</b>`,
    x: (pi + 0.5) / nPw,
    y: 1.04,
    xref: 'paper', yref: 'paper',
    showarrow: false,
    font: { size: 13, color: PW_COLORS[pw] }
  }));

  // Build layout with subplots
  const layout = {
    annotations,
    paper_bgcolor: '#fff',
    plot_bgcolor: '#f8f8f8',
    margin: { t: 60, b: 100, l: 110, r: 60 },
    height: Math.max(400, selCellTypes.length * 38 + 160)
  };

  // Assign axes for each subplot
  const domainStep = 1 / nPw;
  const gap = 0.04;
  selPathways.forEach((pw, pi) => {
    const xKey = pi === 0 ? 'xaxis' : `xaxis${pi+1}`;
    const yKey = pi === 0 ? 'yaxis' : `yaxis${pi+1}`;
    layout[xKey] = {
      domain: [pi * domainStep + gap/2, (pi+1) * domainStep - gap/2],
      tickangle: -40,
      tickfont: { size: 10 },
      showgrid: false
    };
    layout[yKey] = {
      showgrid: false,
      tickfont: { size: 10 },
      anchor: pi === 0 ? 'x' : `x${pi+1}`
    };
    if (pi > 0) {
      layout[yKey].showticklabels = false;
    }
  });

  Plotly.react(container, traces, layout, { responsive: true, displayModeBar: true });
}

/* ============================================================
   TAB 2 — FOREST PLOT
   ============================================================ */
function renderForest() {
  const container = document.getElementById('forest-plot');

  const scores = filteredScores();
  if (scores.length === 0) {
    container.innerHTML = emptyState('No data matches current filters.');
    return;
  }

  const selPathways  = [...state.pathways];
  const selCellTypes = sortCellTypes([...state.cellTypes]);

  if (selPathways.length === 0 || selCellTypes.length === 0) {
    container.innerHTML = emptyState('Select at least one pathway and cell type.');
    return;
  }

  // Compute weighted mean delta and 95% CI per cell_type × pathway
  // Group: { [ct]: { [pw]: { deltas:[], weights:[] } } }
  const groups = {};
  scores.forEach(r => {
    if (!groups[r.cell_type]) groups[r.cell_type] = {};
    if (!groups[r.cell_type][r.pathway]) groups[r.cell_type][r.pathway] = { deltas: [], weights: [] };
    groups[r.cell_type][r.pathway].deltas.push(r.delta);
    groups[r.cell_type][r.pathway].weights.push(r.weight);
  });

  // Compute stats
  const stats = {}; // { [ct]: { [pw]: { mean, ci_lo, ci_hi, n } } }
  selCellTypes.forEach(ct => {
    stats[ct] = {};
    selPathways.forEach(pw => {
      const g = groups[ct]?.[pw];
      if (!g || g.deltas.length === 0) { stats[ct][pw] = null; return; }
      const { deltas, weights } = g;
      const n = deltas.length;
      let mean;
      if (state.useWeights) {
        mean = weightedMean(deltas, weights);
      } else {
        mean = deltas.reduce((a,b) => a+b, 0) / n;
      }
      const s = sd(deltas);
      const se = n > 1 ? s / Math.sqrt(n) : 0;
      const ci = se * 1.96;
      stats[ct][pw] = { mean, ci_lo: mean - ci, ci_hi: mean + ci, n };
    });
  });

  // Sort cell types by overall mean (across pathways)
  const ctMeans = selCellTypes.map(ct => {
    const vals = selPathways.map(pw => stats[ct]?.[pw]?.mean).filter(v => v != null);
    return { ct, mean: vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0 };
  });
  ctMeans.sort((a,b) => b.mean - a.mean);
  const sortedCTs = ctMeans.map(d => d.ct);

  // Build traces (one per pathway)
  const traces = [];
  const vascularCTs = new Set(['Endothelial','Pericyte']);

  selPathways.forEach(pw => {
    const x = [], y = [], errPlus = [], errMinus = [], customdata = [];
    sortedCTs.forEach(ct => {
      const s = stats[ct]?.[pw];
      if (!s) return;
      x.push(s.mean);
      y.push(ct);
      errPlus.push(s.ci_hi - s.mean);
      errMinus.push(s.mean - s.ci_lo);
      customdata.push({ ct, pw, mean: s.mean, ci_lo: s.ci_lo, ci_hi: s.ci_hi, n: s.n });
    });

    traces.push({
      type: 'scatter',
      mode: 'markers',
      name: pw,
      x, y,
      marker: {
        color: PW_COLORS[pw],
        size: 10,
        symbol: 'circle',
        line: { color: '#fff', width: 1.5 }
      },
      error_x: {
        type: 'data',
        symmetric: false,
        array: errPlus,
        arrayminus: errMinus,
        color: PW_COLORS[pw],
        thickness: 2,
        width: 5
      },
      customdata,
      hovertemplate:
        '<b>%{customdata.ct}</b> — %{customdata.pw}<br>' +
        'Weighted mean: %{customdata.mean:.4f}<br>' +
        '95% CI: [%{customdata.ci_lo:.4f}, %{customdata.ci_hi:.4f}]<br>' +
        'N datasets: %{customdata.n}<extra></extra>'
    });
  });

  // Highlight shapes for vascular cell types
  const shapes = [];
  sortedCTs.forEach((ct, i) => {
    if (vascularCTs.has(ct)) {
      shapes.push({
        type: 'rect',
        xref: 'paper', yref: 'y',
        x0: 0, x1: 1,
        y0: i - 0.5, y1: i + 0.5,
        fillcolor: '#0279EE',
        opacity: 0.06,
        line: { width: 0 }
      });
    }
  });

  // Vertical line at x=0
  shapes.push({
    type: 'line',
    xref: 'x', yref: 'paper',
    x0: 0, x1: 0, y0: 0, y1: 1,
    line: { color: '#333', width: 1.5, dash: 'dash' }
  });

  const layout = {
    xaxis: {
      title: { text: 'Weighted Mean Δ Module Score (Stroke − Ctrl)', font: { size: 11 } },
      zeroline: false, showgrid: true, gridcolor: '#eee'
    },
    yaxis: {
      autorange: 'reversed',
      tickfont: { size: 11 }
    },
    shapes,
    legend: { orientation: 'h', y: -0.15, x: 0.5, xanchor: 'center' },
    paper_bgcolor: '#fff',
    plot_bgcolor: '#fff',
    margin: { t: 30, b: 80, l: 130, r: 30 },
    height: Math.max(400, sortedCTs.length * 40 + 150)
  };

  Plotly.react(container, traces, layout, { responsive: true });
}

/* ============================================================
   TAB 3 — TEMPORAL DYNAMICS
   ============================================================ */
function renderTemporal() {
  const container = document.getElementById('temporal-plot');

  const selCellTypes = sortCellTypes([...state.cellTypes]);
  const selPathways  = [...state.pathways];

  if (selPathways.length === 0 || selCellTypes.length === 0) {
    container.innerHTML = emptyState('Select at least one pathway and cell type.');
    return;
  }

  // Filter temporal data
  const tData = DATA_TEMPORAL.filter(r =>
    selCellTypes.includes(r.cell_type) &&
    selPathways.includes(r.pathway) &&
    r.gene_set === state.geneSet
  );

  if (tData.length === 0) {
    container.innerHTML = emptyState('No temporal data for current cell type / gene set selection.');
    return;
  }

  const nPw = selPathways.length;
  const traces = [];
  const annotations = [];

  selPathways.forEach((pw, pi) => {
    const pwData = tData.filter(r => r.pathway === pw);

    // GSE197341 (solid) and GSE279666 (dashed)
    ['GSE197341','GSE279666'].forEach(ds => {
      const dsData = pwData.filter(r => r.dataset === ds);
      if (dsData.length === 0) return;

      selCellTypes.forEach(ct => {
        const ctData = dsData.filter(r => r.cell_type === ct);
        if (ctData.length === 0) return;

        // Sort by day
        ctData.sort((a,b) => a.day - b.day);

        traces.push({
          type: 'scatter',
          mode: 'lines+markers',
          name: ct,
          legendgroup: ct,
          showlegend: pi === 0 && ds === 'GSE197341',
          x: ctData.map(r => r.day),
          y: ctData.map(r => r.delta),
          xaxis: pi === 0 ? 'x' : `x${pi+1}`,
          yaxis: pi === 0 ? 'y' : `y${pi+1}`,
          line: {
            color: CT_COLORS[ct] || '#888',
            width: 2,
            dash: ds === 'GSE279666' ? 'dash' : 'solid'
          },
          marker: {
            color: CT_COLORS[ct] || '#888',
            size: ds === 'GSE279666' ? 6 : 8,
            symbol: ds === 'GSE279666' ? 'diamond' : 'circle'
          },
          hovertemplate:
            `<b>${ct}</b> (${ds})<br>` +
            `Day: %{x}<br>` +
            `Delta: %{y:.4f}<br>` +
            `Pathway: ${pw}<extra></extra>`
        });
      });
    });

    // Subplot title annotation
    annotations.push({
      text: `<b>${pw}</b>`,
      x: (pi + 0.5) / nPw,
      y: 1.05,
      xref: 'paper', yref: 'paper',
      showarrow: false,
      font: { size: 13, color: PW_COLORS[pw] }
    });
  });

  // Layout with subplots
  const domainStep = 1 / nPw;
  const gap = 0.05;
  const layout = {
    annotations,
    paper_bgcolor: '#fff',
    plot_bgcolor: '#fafafa',
    margin: { t: 60, b: 80, l: 70, r: 20 },
    height: 520,
    legend: {
      orientation: 'h', y: -0.18, x: 0.5, xanchor: 'center',
      font: { size: 10 }
    }
  };

  selPathways.forEach((pw, pi) => {
    const xKey = pi === 0 ? 'xaxis' : `xaxis${pi+1}`;
    const yKey = pi === 0 ? 'yaxis' : `yaxis${pi+1}`;
    layout[xKey] = {
      domain: [pi * domainStep + gap/2, (pi+1) * domainStep - gap/2],
      title: { text: 'Days post-stroke', font: { size: 10 } },
      tickvals: [3, 7, 14, 28],
      ticktext: ['D3','D7','D14','D28'],
      showgrid: true, gridcolor: '#eee'
    };
    layout[yKey] = {
      title: pi === 0 ? { text: 'Δ Module Score', font: { size: 10 } } : {},
      showgrid: true, gridcolor: '#eee',
      zeroline: true, zerolinecolor: '#ccc', zerolinewidth: 1,
      anchor: pi === 0 ? 'x' : `x${pi+1}`
    };
    if (pi > 0) layout[yKey].showticklabels = false;
  });

  Plotly.react(container, traces, layout, { responsive: true });
}

/* ============================================================
   TAB 4 — PER-GENE EXPRESSION
   ============================================================ */
function initGeneControls() {
  const geneSelect = document.getElementById('gene-select');
  // Get unique genes from DATA_GENE_EXPR
  const genes = [...new Set(DATA_GENE_EXPR.map(r => r.gene))].sort();
  genes.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g;
    opt.textContent = g;
    if (g === 'Casp3') opt.selected = true;
    geneSelect.appendChild(opt);
  });

  geneSelect.addEventListener('change', e => {
    state.gene = e.target.value;
    renderGene();
  });
  document.getElementById('groupby-select').addEventListener('change', e => {
    state.groupBy = e.target.value;
    renderGene();
  });
  document.getElementById('show-select').addEventListener('change', e => {
    state.showMode = e.target.value;
    renderGene();
  });
}

function renderGene() {
  const container = document.getElementById('gene-plot');
  const titleEl   = document.getElementById('gene-plot-title');
  const subtitleEl = document.getElementById('gene-plot-subtitle');

  const gene = state.gene;
  const groupBy = state.groupBy;
  const showMode = state.showMode;

  // Filter gene expression data
  const gData = DATA_GENE_EXPR.filter(r =>
    r.gene === gene &&
    state.datasets.has(r.dataset) &&
    state.cellTypes.has(r.cell_type)
  );

  if (gData.length === 0) {
    container.innerHTML = emptyState('No expression data for current selection.');
    return;
  }

  // Get pathway for this gene
  const genePw = gData[0]?.pathway || 'Apoptosis';
  const geneColor = PW_COLORS[genePw] || '#888';

  titleEl.textContent = `${gene} Expression (${genePw})`;
  subtitleEl.textContent = showMode === 'both'
    ? `Mean expression in Ctrl vs Stroke conditions, grouped by ${groupBy === 'cell_type' ? 'cell type' : 'dataset'}.`
    : `Delta expression (Stroke − Ctrl), grouped by ${groupBy === 'cell_type' ? 'cell type' : 'dataset'}.`;

  // Aggregate: group by groupBy key, then average ctrl/stroke/delta
  const groups = {};
  gData.forEach(r => {
    const key = groupBy === 'cell_type' ? r.cell_type : r.dataset;
    if (!groups[key]) groups[key] = { ctrl: [], stroke: [], delta: [] };
    groups[key].ctrl.push(r.ctrl_expr);
    groups[key].stroke.push(r.stroke_expr);
    groups[key].delta.push(r.delta);
  });

  // Sort keys
  let keys;
  if (groupBy === 'cell_type') {
    keys = sortCellTypes(Object.keys(groups));
  } else {
    keys = sortDatasets(Object.keys(groups));
  }

  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;

  const traces = [];

  if (showMode === 'both') {
    // Two bar groups: Ctrl and Stroke
    const ctrlVals = keys.map(k => avg(groups[k].ctrl));
    const strokeVals = keys.map(k => avg(groups[k].stroke));

    // Colors per bar
    const barColors = groupBy === 'cell_type'
      ? keys.map(k => CT_COLORS[k] || '#888')
      : keys.map(k => '#0279EE');

    traces.push({
      type: 'bar',
      name: 'Control',
      x: keys,
      y: ctrlVals,
      marker: {
        color: groupBy === 'cell_type'
          ? keys.map(k => CT_COLORS[k] + '55' || '#88888855')
          : '#0279EE55',
        line: {
          color: groupBy === 'cell_type'
            ? keys.map(k => CT_COLORS[k] || '#888')
            : '#0279EE',
          width: 1.5
        }
      },
      hovertemplate: `<b>%{x}</b><br>Ctrl: %{y:.4f}<br>Gene: ${gene}<extra></extra>`
    });

    traces.push({
      type: 'bar',
      name: 'Stroke',
      x: keys,
      y: strokeVals,
      marker: {
        color: groupBy === 'cell_type'
          ? keys.map(k => CT_COLORS[k] || '#888')
          : '#DC143C',
        line: { color: '#fff', width: 0.5 }
      },
      hovertemplate: `<b>%{x}</b><br>Stroke: %{y:.4f}<br>Gene: ${gene}<extra></extra>`
    });

  } else {
    // Delta only
    const deltaVals = keys.map(k => avg(groups[k].delta));
    const barColors = groupBy === 'cell_type'
      ? keys.map(k => CT_COLORS[k] || '#888')
      : keys.map(k => geneColor);

    traces.push({
      type: 'bar',
      name: `Δ ${gene}`,
      x: keys,
      y: deltaVals,
      marker: {
        color: barColors,
        line: { color: '#fff', width: 0.5 }
      },
      hovertemplate: `<b>%{x}</b><br>Δ: %{y:.4f}<br>Gene: ${gene}<extra></extra>`
    });
  }

  const layout = {
    barmode: showMode === 'both' ? 'group' : 'relative',
    xaxis: {
      title: { text: groupBy === 'cell_type' ? 'Cell Type' : 'Dataset', font: { size: 11 } },
      tickangle: -35, tickfont: { size: 10 }
    },
    yaxis: {
      title: { text: showMode === 'both' ? 'Mean Expression' : 'Δ Expression (Stroke − Ctrl)', font: { size: 11 } },
      showgrid: true, gridcolor: '#eee',
      zeroline: true, zerolinecolor: '#ccc'
    },
    legend: { orientation: 'h', y: -0.25, x: 0.5, xanchor: 'center' },
    paper_bgcolor: '#fff',
    plot_bgcolor: '#fff',
    margin: { t: 20, b: 100, l: 70, r: 20 },
    height: 450
  };

  Plotly.react(container, traces, layout, { responsive: true });
}

/* ============================================================
   TAB 5 — GLIAL STATES
   ============================================================ */
function renderGlial() {
  renderGlialSection('Astrocyte', ['A1_astrocyte','A2_astrocyte','Pan_reactive'], 'astro-plot');
  renderGlialSection('Microglia', ['M1_microglia','M2_microglia','DAM'], 'micro-plot');
}

function renderGlialSection(stateType, signatures, containerId) {
  const container = document.getElementById(containerId);

  // Filter by selected datasets and state_type
  const gData = DATA_GLIAL.filter(r =>
    r.state_type === stateType &&
    state.datasets.has(r.dataset) &&
    signatures.includes(r.signature)
  );

  if (gData.length === 0) {
    container.innerHTML = emptyState(`No ${stateType} glial state data for selected datasets.`);
    return;
  }

  // Get unique datasets present
  const datasets = sortDatasets([...new Set(gData.map(r => r.dataset))]);

  // Dataset colors (use a palette)
  const DS_COLORS = [
    '#0279EE','#FF9400','#75A025','#DC143C','#9370DB',
    '#20B2AA','#FF6347','#4169E1','#32CD32'
  ];
  const dsColorMap = {};
  ALL_DATASETS.forEach((ds, i) => { dsColorMap[ds] = DS_COLORS[i % DS_COLORS.length]; });

  // Build traces: one per dataset
  const traces = [];
  datasets.forEach(ds => {
    const dsData = gData.filter(r => r.dataset === ds);
    const x = [], y = [];
    signatures.forEach(sig => {
      const entry = dsData.find(r => r.signature === sig);
      x.push(sig.replace(/_/g,' '));
      y.push(entry ? entry.delta : null);
    });

    traces.push({
      type: 'bar',
      name: ds,
      x, y,
      marker: { color: dsColorMap[ds] },
      hovertemplate:
        `<b>${ds}</b><br>` +
        `Signature: %{x}<br>` +
        `Δ: %{y:.4f}<extra></extra>`
    });
  });

  const sigLabels = signatures.map(s => s.replace(/_/g,' '));

  const layout = {
    barmode: 'group',
    xaxis: {
      tickfont: { size: 11 },
      showgrid: false
    },
    yaxis: {
      title: { text: 'Δ Score (Stroke − Ctrl)', font: { size: 11 } },
      showgrid: true, gridcolor: '#eee',
      zeroline: true, zerolinecolor: '#aaa', zerolinewidth: 1.5
    },
    legend: { orientation: 'h', y: -0.25, x: 0.5, xanchor: 'center', font: { size: 10 } },
    paper_bgcolor: '#fff',
    plot_bgcolor: '#fff',
    margin: { t: 20, b: 80, l: 70, r: 20 },
    height: 360
  };

  Plotly.react(container, traces, layout, { responsive: true });
}

/* ============================================================
   INITIALIZATION
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
  initSidebar();
  initTabs();
  initGeneControls();

  // Initial render
  renderOverview();
});
</script>
